<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Meu Planejador</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f172a;
  color: white;
}

h1 { text-align: center; padding: 10px; }

button {
  padding: 6px;
  border: none;
  border-radius: 6px;
  background: #2563eb;
  color: white;
}

.board {
  display: flex;
  gap: 12px;
  padding: 12px;
  overflow-x: auto;
}

.column {
  background: #1e293b;
  min-width: 260px;
  border-radius: 10px;
  padding: 10px;
}

.column-header {
  display: flex;
  justify-content: space-between;
  cursor: grab;
}

.column-title {
  flex: 1;
  text-align: center;
}

.cards { min-height: 60px; }

.card {
  background: #334155;
  padding: 10px;
  margin: 8px 0;
  border-radius: 8px;
  cursor: pointer;
  position: relative;
}

.card.done { background: #16a34a; }

.actions {
  position: absolute;
  top: 4px;
  right: 6px;
  display: flex;
  gap: 6px;
}

.modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.6);
  display: none;
  align-items: center;
  justify-content: center;
}

.modal-content {
  background: #1e293b;
  width: 90%;
  max-width: 400px;
  padding: 16px;
  border-radius: 10px;
}
</style>
</head>

<body>

<h1>📋 Meu Planejador</h1>
<button onclick="addColumn()">+ Nova coluna</button>

<div class="board" id="board"></div>

<div class="modal" id="modal">
  <div class="modal-content">
    <h3 contenteditable id="modalTitle"></h3>
    <p><strong>Complementos:</strong></p>
    <ul id="relations"></ul>
    <button onclick="closeModal()">Fechar</button>
  </div>
</div>

<script>
let draggedCard = null;
let activeCard = null;

function addColumn() {
  const col = document.createElement("div");
  col.className = "column";

  const head = document.createElement("div");
  head.className = "column-header";
  head.draggable = true;

  const title = document.createElement("div");
  title.className = "column-title";
  title.contentEditable = true;
  title.textContent = "Nova coluna";

  head.append(title);
  col.append(head);

  const cards = document.createElement("div");
  cards.className = "cards";
  cards.ondragover = e => e.preventDefault();
  cards.ondrop = () => {
    if (draggedCard) cards.appendChild(draggedCard);
    updateDone(cards);
  };

  const btn = document.createElement("button");
  btn.textContent = "+ Tarefa";
  btn.onclick = () => addCard(cards);

  col.append(cards, btn);
  document.getElementById("board").appendChild(col);
}

function addCard(container) {
  const card = document.createElement("div");
  card.className = "card";
  card.textContent = "Nova tarefa";
  card.draggable = true;
  card.relations = [];

  card.onclick = e => {
    if (e.target.tagName === "SPAN") return;
    openModal(card);
  };

  card.ondragstart = () => draggedCard = card;

  const act = document.createElement("div");
  act.className = "actions";

  const link = document.createElement("span");
  link.textContent = "🔗";
  link.onclick = () => relate(card);

  const del = document.createElement("span");
  del.textContent = "❌";
  del.onclick = () => card.remove();

  act.append(link, del);
  card.append(act);
  container.appendChild(card);

  updateDone(container);
}

function updateDone(container) {
  const title = container.parentElement
    .querySelector(".column-title")
    .textContent.toLowerCase();
  [...container.children].forEach(c =>
    c.classList.toggle("done", title.includes("conclu"))
  );
}

function relate(card) {
  const tasks = [...document.querySelectorAll(".card")]
    .filter(c => c !== card && !c.classList.contains("done"));

  const names = tasks.map(c => c.firstChild.textContent.trim());
  const choice = prompt("Digite o nome da tarefa principal:\n\n" + names.join("\n"));
  const found = tasks.find(c => c.firstChild.textContent.trim() === choice);
  if (found) card.relations.push(choice);
}

function openModal(card) {
  activeCard = card;
  document.getElementById("modalTitle").innerText = card.firstChild.textContent;
  const list = document.getElementById("relations");
  list.innerHTML = "";
  card.relations.forEach(r => {
    const li = document.createElement("li");
    li.textContent = r;
    list.appendChild(li);
  });
  document.getElementById("modal").style.display = "flex";
}

function closeModal() {
  activeCard.firstChild.textContent =
    document.getElementById("modalTitle").innerText;
  document.getElementById("modal").style.display = "none";
}
</script>

</body>
</html>
