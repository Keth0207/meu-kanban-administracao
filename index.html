<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Meu Planejador</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f172a;
  color: white;
}

h1 {
  text-align: center;
  padding: 10px;
}

.top-actions {
  text-align: center;
  margin-bottom: 10px;
}

.top-actions button {
  padding: 8px 12px;
  border: none;
  border-radius: 6px;
  background: #2563eb;
  color: white;
}

.board {
  display: flex;
  gap: 12px;
  padding: 12px;
  overflow-x: auto;
}

.column {
  background: #1e293b;
  min-width: 240px;
  border-radius: 10px;
  padding: 10px;
}

.column-header {
  text-align: center;
  font-size: 16px;
  cursor: grab;
}

.column-header[contenteditable="true"] {
  outline: 1px dashed #64748b;
}

.cards {
  min-height: 60px;
}

.card {
  background: #334155;
  padding: 10px;
  margin: 8px 0;
  border-radius: 8px;
  cursor: grab;
}

.card.done {
  background: #16a34a;
}

.column button {
  width: 100%;
  margin-top: 6px;
  padding: 6px;
  border: none;
  border-radius: 6px;
  background: #475569;
  color: white;
}
</style>
</head>

<body>

<h1>📋 Meu Planejador</h1>

<div class="top-actions">
  <button onclick="addColumn()">+ Nova coluna</button>
</div>

<div class="board" id="board" ondragover="allowDrop(event)" ondrop="dropColumn(event)"></div>

<script>
let columnCount = 0;
const maxColumns = 15;
let draggedCard = null;
let draggedColumn = null;

/* ADICIONA COLUNA */
function addColumn() {
  if (columnCount >= maxColumns) {
    alert("Limite máximo de 15 colunas atingido.");
    return;
  }

  const column = document.createElement("div");
  column.className = "column";
  column.draggable = true;

  column.ondragstart = () => draggedColumn = column;

  const header = document.createElement("div");
  header.className = "column-header";
  header.contentEditable = true;
  header.textContent = "Nova coluna";

  const cards = document.createElement("div");
  cards.className = "cards";
  cards.ondragover = e => e.preventDefault();
  cards.ondrop = e => dropCard(e, header);

  const btn = document.createElement("button");
  btn.textContent = "+ Nova tarefa";
  btn.onclick = () => addCard(cards);

  column.appendChild(header);
  column.appendChild(cards);
  column.appendChild(btn);

  document.getElementById("board").appendChild(column);
  columnCount++;
}

/* ADICIONA CARTÃO */
function addCard(container) {
  const card = document.createElement("div");
  card.className = "card";
  card.textContent = "Nova tarefa";
  card.contentEditable = true;
  card.draggable = true;

  card.ondragstart = () => draggedCard = card;

  container.appendChild(card);
}

/* SOLTAR CARTÃO */
function dropCard(ev, header) {
  ev.preventDefault();
  if (!draggedCard) return;

  draggedCard.classList.remove("done");

  if (header.textContent.toLowerCase().includes("conclu")) {
    draggedCard.classList.add("done");
    alert("✅ Tarefa concluída!");
  }

  ev.target.appendChild(draggedCard);
  draggedCard = null;
}

/* MOVER COLUNAS */
function allowDrop(ev) {
  ev.preventDefault();
}

function dropColumn(ev) {
  ev.preventDefault();
  if (!draggedColumn) return;

  const board = document.getElementById("board");
  board.appendChild(draggedColumn);
  draggedColumn = null;
}

/* COLUNA INICIAL */
addColumn();
</script>

</body>
</html>
