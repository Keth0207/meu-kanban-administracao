<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Meu Planejador</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f172a;
  color: white;
}

header {
  display: flex;
  justify-content: space-between;
  padding: 10px;
}

button {
  padding: 6px 10px;
  border: none;
  border-radius: 6px;
  background: #2563eb;
  color: white;
  cursor: pointer;
}

.board {
  display: flex;
  gap: 12px;
  padding: 12px;
  overflow-x: auto;
}

.column {
  background: #1e293b;
  min-width: 260px;
  border-radius: 10px;
  padding: 10px;
}

.column-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.column-title {
  font-weight: bold;
}

.cards {
  min-height: 50px;
}

.card {
  background: #334155;
  padding: 8px;
  margin: 8px 0;
  border-radius: 8px;
  cursor: grab;
}

.card.done { background: #16a34a; }
.card.progress { background: #eab308; color: black; }
.card.adm { background: #1e3a8a; }

.modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.6);
  display: none;
  justify-content: center;
  align-items: center;
}

.modal-content {
  background: #1e293b;
  width: 95%;
  max-width: 500px;
  padding: 16px;
  border-radius: 10px;
}

textarea {
  width: 100%;
  min-height: 60px;
}
</style>
</head>

<body>

<header>
  <h2>📋 Meu Planejador</h2>
  <button onclick="addColumn()">➕ Nova coluna</button>
</header>

<div class="board" id="board"></div>

<div class="modal" id="modal">
  <div class="modal-content">
    <h3 contenteditable id="mTitle"></h3>

    <h4>Descrição / Links</h4>
    <textarea id="mDesc"></textarea>

    <h4>Checklist</h4>
    <div id="mChecklist"></div>
    <button onclick="addChecklist()">+ Item</button>

    <h4>Histórico</h4>
    <div id="mHistory"></div>

    <br>
    <button onclick="generatePDF()">📄 Gerar PDF</button>
    <button onclick="closeModal()">Fechar</button>
  </div>
</div>

<script>
let state = JSON.parse(localStorage.getItem("planner")) || { columns: [] };
let activeCard = null;

function save() {
  localStorage.setItem("planner", JSON.stringify(state));
}

function addColumn() {
  if (state.columns.length >= 25) {
    alert("Limite de 25 colunas.");
    return;
  }
  state.columns.push({ title: "Nova coluna", cards: [] });
  save(); render();
}

function addCard(col) {
  const card = {
    title: "Nova tarefa",
    desc: "",
    checklist: [],
    history: [{ step: "Criado", date: new Date().toLocaleString() }],
    created: Date.now()
  };
  col.cards.push(card);
  save(); render();
}

function openModal(card) {
  activeCard = card;
  mTitle.innerText = card.title;
  mDesc.value = card.desc;
  renderChecklist();
  renderHistory();
  modal.style.display = "flex";
}

function closeModal() {
  activeCard.title = mTitle.innerText;
  activeCard.desc = mDesc.value;
  save(); render();
  modal.style.display = "none";
}

function addChecklist() {
  const txt = prompt("Item:");
  if (txt) activeCard.checklist.push({ txt, done:false });
  save(); renderChecklist();
}

function renderChecklist() {
  mChecklist.innerHTML = "";
  activeCard.checklist.forEach(i => {
    const d = document.createElement("div");
    d.innerText = "☑ " + i.txt;
    mChecklist.appendChild(d);
  });
}

function renderHistory() {
  mHistory.innerHTML = "";
  activeCard.history.forEach(h => {
    const d = document.createElement("div");
    d.innerText = `${h.step} - ${h.date}`;
    mHistory.appendChild(d);
  });
}

function generatePDF() {
  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF();
  let y = 10;

  pdf.text(`Tarefa: ${activeCard.title}`, 10, y); y+=8;
  pdf.text(`Descrição: ${activeCard.desc}`, 10, y); y+=8;
  pdf.text("Histórico:", 10, y); y+=6;

  activeCard.history.forEach(h=>{
    pdf.text(`- ${h.step} (${h.date})`,10,y);
    y+=6;
  });

  pdf.save(activeCard.title + ".pdf");
}

function render() {
  board.innerHTML = "";
  state.columns.forEach(col => {
    const c = document.createElement("div");
    c.className = "column";

    const h = document.createElement("div");
    h.className = "column-header";

    const t = document.createElement("div");
    t.className = "column-title";
    t.contentEditable = true;
    t.innerText = col.title;
    t.onblur = ()=>{ col.title=t.innerText; save(); };

    const del = document.createElement("button");
    del.textContent="🗑";
    del.onclick=()=>{ state.columns=state.columns.filter(x=>x!==col); save(); render(); };

    h.append(t,del);
    c.appendChild(h);

    const cards = document.createElement("div");
    cards.className="cards";

    col.cards.forEach(card=>{
      const d=document.createElement("div");
      d.className="card";
      d.innerText=card.title;
      d.onclick=()=>openModal(card);

      const name = col.title.toLowerCase();
      if(name.includes("conclu")) d.classList.add("done");
      if(name.includes("andamento")) d.classList.add("progress");
      if(card.title.includes("AdmK")) d.classList.add("adm");

      cards.appendChild(d);
    });

    const btn=document.createElement("button");
    btn.textContent="+ Tarefa";
    btn.onclick=()=>addCard(col);

    c.append(cards,btn);
    board.appendChild(c);
  });
}

render();
</script>

</body>
</html>
