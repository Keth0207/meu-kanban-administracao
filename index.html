<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Meu Planejador</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f172a;
  color: white;
}

h1 {
  text-align: center;
  padding: 10px;
}

.top-actions {
  text-align: center;
  margin-bottom: 10px;
}

.top-actions button {
  padding: 8px 12px;
  border: none;
  border-radius: 6px;
  background: #2563eb;
  color: white;
  font-size: 14px;
}

.board {
  display: flex;
  gap: 12px;
  padding: 12px;
  overflow-x: auto;
}

.column {
  background: #1e293b;
  min-width: 240px;
  border-radius: 10px;
  padding: 10px;
}

.column h2 {
  text-align: center;
  font-size: 16px;
}

.cards {
  min-height: 60px;
}

.card {
  background: #334155;
  padding: 10px;
  margin: 8px 0;
  border-radius: 8px;
  cursor: grab;
}

.card.done {
  background: #16a34a;
}

.column button {
  width: 100%;
  margin-top: 6px;
  padding: 6px;
  border: none;
  border-radius: 6px;
  background: #475569;
  color: white;
}
</style>
</head>

<body>

<h1>📋 Meu Planejador</h1>

<div class="top-actions">
  <button onclick="addColumn()">+ Nova coluna</button>
</div>

<div class="board" id="board"></div>

<script>
let columnCount = 0;
const maxColumns = 15;
let draggedCard = null;

/* CRIA COLUNA */
function addColumn() {
  if (columnCount >= maxColumns) {
    alert("Limite máximo de 15 colunas atingido.");
    return;
  }

  const name = prompt("Nome da coluna:");
  if (!name) return;

  const column = document.createElement("div");
  column.className = "column";

  const title = document.createElement("h2");
  title.textContent = name;

  const cards = document.createElement("div");
  cards.className = "cards";
  cards.ondragover = e => e.preventDefault();
  cards.ondrop = e => drop(e, name.toLowerCase() === "concluído");

  const btn = document.createElement("button");
  btn.textContent = "+ Nova tarefa";
  btn.onclick = () => addCard(cards);

  column.appendChild(title);
  column.appendChild(cards);
  column.appendChild(btn);

  document.getElementById("board").appendChild(column);
  columnCount++;
}

/* CRIA CARTÃO */
function addCard(container) {
  const card = document.createElement("div");
  card.className = "card";
  card.textContent = "Nova tarefa";
  card.contentEditable = true;
  card.draggable = true;

  card.ondragstart = () => draggedCard = card;

  container.appendChild(card);
}

/* SOLTAR CARTÃO */
function drop(ev, isDone) {
  ev.preventDefault();
  if (!draggedCard) return;

  draggedCard.classList.remove("done");
  if (isDone) draggedCard.classList.add("done");

  ev.target.appendChild(draggedCard);
  draggedCard = null;
}

/* COLUNA INICIAL */
addColumn();
</script>

</body>
</html>
