<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Meu Planejador</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f172a;
  color: white;
}

h1 { text-align: center; padding: 10px; }

.top { text-align: center; margin-bottom: 10px; }

button {
  padding: 6px;
  border: none;
  border-radius: 6px;
  background: #2563eb;
  color: white;
}

.board {
  display: flex;
  gap: 12px;
  padding: 12px;
  overflow-x: auto;
}

.column {
  background: #1e293b;
  min-width: 240px;
  border-radius: 10px;
  padding: 10px;
}

.column-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  cursor: grab;
}

.column-title {
  flex: 1;
  text-align: center;
}

.cards { min-height: 60px; }

.card {
  background: #334155;
  padding: 10px;
  margin: 8px 0;
  border-radius: 8px;
  cursor: grab;
  position: relative;
}

.card.done { background: #16a34a; }

.card .actions {
  position: absolute;
  right: 6px;
  top: 4px;
  display: flex;
  gap: 6px;
}

.card .actions span {
  cursor: pointer;
}
</style>
</head>

<body>

<h1>📋 Meu Planejador</h1>

<div class="top">
  <button onclick="addColumn()">+ Nova coluna</button>
</div>

<div class="board" id="board"></div>

<script>
let draggedCard = null;
let draggedColumn = null;
let columnCount = 0;
const maxColumns = 15;

/* COLUNA */
function addColumn() {
  if (columnCount >= maxColumns) return alert("Máx. 15 colunas");

  const column = document.createElement("div");
  column.className = "column";

  const header = document.createElement("div");
  header.className = "column-header";
  header.draggable = true;

  header.ondragstart = () => draggedColumn = column;
  header.ondragover = e => e.preventDefault();
  header.ondrop = () => {
    if (draggedColumn && draggedColumn !== column) {
      board.insertBefore(draggedColumn, column);
      draggedColumn = null;
    }
  };

  const title = document.createElement("div");
  title.className = "column-title";
  title.contentEditable = true;
  title.textContent = "Nova coluna";

  const delCol = document.createElement("span");
  delCol.textContent = "🗑️";
  delCol.onclick = () => {
    if (confirm("Excluir coluna?")) column.remove();
  };

  header.append(title, delCol);

  const cards = document.createElement("div");
  cards.className = "cards";
  cards.ondragover = e => e.preventDefault();
  cards.ondrop = () => {
    if (!draggedCard) return;
    cards.appendChild(draggedCard);
    draggedCard = null;
  };

  const btn = document.createElement("button");
  btn.textContent = "+ Tarefa";
  btn.onclick = () => addCard(cards);

  column.append(header, cards, btn);
  board.appendChild(column);
  columnCount++;
}

/* CARTÃO */
function addCard(container) {
  const card = document.createElement("div");
  card.className = "card";
  card.contentEditable = true;
  card.textContent = "Nova tarefa";
  card.draggable = true;

  card.ondragstart = () => draggedCard = card;

  const actions = document.createElement("div");
  actions.className = "actions";

  const link = document.createElement("span");
  link.textContent = "🔗";
  link.onclick = () => openRelation(card);

  const del = document.createElement("span");
  del.textContent = "❌";
  del.onclick = () => {
    if (confirm("Excluir tarefa?")) card.remove();
  };

  actions.append(link, del);
  card.appendChild(actions);
  container.appendChild(card);
}

/* RELACIONAR */
function openRelation(card) {
  const tasks = [...document.querySelectorAll(".card")]
    .filter(c => 
      c !== card &&
      !c.closest(".column")
       .querySelector(".column-title")
       .textContent.toLowerCase().includes("conclu")
    )
    .map(c => c.textContent.replace("❌","").trim())
    .sort();

  if (!tasks.length) {
    alert("Nenhuma tarefa disponível.");
    return;
  }

  const choice = prompt(
    "Escolha a tarefa principal:\n\n" + tasks.join("\n")
  );

  if (choice) {
    alert(`Tarefa relacionada a: ${choice}`);
  }
}

/* inicial */
addColumn();
</script>

</body>
</html>
