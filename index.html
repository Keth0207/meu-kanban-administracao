<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Meu Planejador</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{margin:0;font-family:Arial;background:#f4f6f8}
#board{display:flex;gap:12px;padding:15px;overflow-x:auto}
.column{background:#e9ecef;min-width:260px;border-radius:8px;display:flex;flex-direction:column}
.column-header{padding:8px;background:#dee2e6;font-weight:bold;cursor:grab}
.column-header input{width:100%;border:none;background:transparent;font-weight:bold}
.cards{padding:8px;flex:1}
.card{background:#fff;border-radius:6px;padding:8px;margin-bottom:8px;cursor:grab;position:relative}
.icons{position:absolute;top:5px;right:5px;display:flex;gap:6px}
.icon{cursor:pointer;font-size:14px}
.check-indicator{font-size:12px;margin-top:4px}

.green{background:#d4edda!important}
.yellow{background:#fff3cd!important}
.blue{background:#0b3c5d!important;color:#fff}
.stripe-green{border-left:5px solid #28a745}
.stripe-yellow{border-left:5px solid #ffc107}

button{border:none;padding:6px;border-radius:6px;cursor:pointer}

.modal{
  position:fixed;inset:0;
  background:rgba(0,0,0,.5);
  display:none;
  align-items:center;
  justify-content:center;
}
.modal-content{
  background:#fff;
  width:320px;
  padding:12px;
  border-radius:8px;
}
.modal-content textarea{width:100%;height:60px}
</style>
</head>

<body>

<div id="board"></div>
<button onclick="addColumn()">+ Nova coluna</button>

<div class="modal" id="modal">
  <div class="modal-content">
    <h4 id="modalTitle"></h4>

    <b>Descrição</b>
    <textarea id="desc"></textarea>

    <b>Checklist</b>
    <div id="checklist"></div>
    <input id="newCheck" placeholder="Nova tarefa do checklist">
    <button onclick="addCheck()">Adicionar</button>

    <b>Histórico</b>
    <div id="history" style="font-size:12px;max-height:80px;overflow:auto"></div>

    <br>
    <button onclick="closeModal()">Fechar</button>
  </div>
</div>

<script>
let state = JSON.parse(localStorage.getItem("board")) || {columns:[]};
let draggedCard=null, draggedColumn=null, activeCard=null;

function save(){
  localStorage.setItem("board",JSON.stringify(state));
}

function addColumn(){
  if(state.columns.length>=25)return alert("Máx 25 colunas");
  state.columns.push({title:"Nova coluna",cards:[]});
  save();render();
}

function log(card,col){
  card.history.push({
    col,
    date:new Date().toLocaleString()
  });
}

function render(){
  board.innerHTML="";

  state.columns.forEach((col,ci)=>{
    const column=document.createElement("div");
    column.className="column";

    /* HEADER */
    const header=document.createElement("div");
    header.className="column-header";
    header.draggable=true;
    header.ondragstart=e=>{
      draggedColumn=ci;
      e.stopPropagation();
    };

    const titleInput=document.createElement("input");
    titleInput.value=col.title;
    titleInput.onchange=e=>{
      col.title=e.target.value;
      save();render();
    };
    header.appendChild(titleInput);

    column.ondragover=e=>{
      if(draggedColumn!==null)e.preventDefault();
    };
    column.ondrop=e=>{
      if(draggedColumn===null)return;
      const temp=state.columns[draggedColumn];
      state.columns.splice(draggedColumn,1);
      state.columns.splice(ci,0,temp);
      draggedColumn=null;
      save();render();
    };

    /* CARDS */
    const cards=document.createElement("div");
    cards.className="cards";
    cards.ondragover=e=>e.preventDefault();
    cards.ondrop=e=>{
      e.stopPropagation();
      if(!draggedCard)return;
      draggedCard.from.cards.splice(draggedCard.index,1);
      log(draggedCard.card,col.title);
      col.cards.push(draggedCard.card);
      draggedCard=null;
      save();render();
    };

    col.cards.forEach((card,i)=>{
      const c=document.createElement("div");
      c.className="card";
      c.draggable=true;

      c.ondragstart=e=>{
        draggedCard={card,index:i,from:col};
        e.stopPropagation();
      };

      const title=document.createElement("div");
      title.contentEditable=true;
      title.innerText=card.title;
      title.onblur=e=>{
        card.title=e.target.innerText;
        save();render();
      };
      c.appendChild(title);

      if(card.checklist.length){
        const done=card.checklist.filter(x=>x.done).length;
        const ind=document.createElement("div");
        ind.className="check-indicator";
        ind.innerText=`☑ ${done}/${card.checklist.length}`;
        c.appendChild(ind);
      }

      const icons=document.createElement("div");
      icons.className="icons";

      if(card.checklist.length){
        const ck=document.createElement("span");
        ck.innerText="☑";
        ck.className="icon";
        ck.onclick=()=>openModal(card);
        icons.appendChild(ck);
      }

      const edit=document.createElement("span");
      edit.innerText="✎";
      edit.className="icon";
      edit.onclick=()=>openModal(card);
      icons.appendChild(edit);

      const del=document.createElement("span");
      del.innerText="✖";
      del.className="icon";
      del.onclick=()=>{
        col.cards.splice(i,1);
        save();render();
      };
      icons.appendChild(del);

      c.appendChild(icons);

      const t=col.title.toLowerCase();
      if(t.includes("concluído"))c.classList.add("green","stripe-green");
      if(t.includes("andamento"))c.classList.add("yellow","stripe-yellow");
      if(card.title.includes("AdmK"))c.classList.add("blue");

      cards.appendChild(c);
    });

    const addBtn=document.createElement("button");
    addBtn.innerText="+ Card";
    addBtn.onclick=()=>{
      col.cards.push({
        title:"Nova tarefa",
        desc:"",
        checklist:[],
        history:[{col:col.title,date:new Date().toLocaleString()}]
      });
      save();render();
    };

    column.appendChild(header);
    column.appendChild(cards);
    column.appendChild(addBtn);
    board.appendChild(column);
  });
}

function openModal(card){
  activeCard=card;
  modal.style.display="flex";
  modalTitle.innerText=card.title;
  desc.value=card.desc||"";
  checklist.innerHTML="";
  history.innerHTML="";

  desc.onblur=()=>{card.desc=desc.value;save()};

  card.checklist.forEach((c,i)=>{
    const d=document.createElement("div");
    const cb=document.createElement("input");
    cb.type="checkbox";
    cb.checked=c.done;
    cb.onchange=e=>{
      c.done=e.target.checked;
      save();render();
    };
    d.appendChild(cb);
    d.append(" "+c.text);
    checklist.appendChild(d);
  });

  card.history.forEach(h=>{
    const p=document.createElement("div");
    p.innerText=`${h.date} → ${h.col}`;
    history.appendChild(p);
  });
}

function addCheck(){
  if(!newCheck.value)return;
  activeCard.checklist.push({text:newCheck.value,done:false});
  newCheck.value="";
  save();render();
  openModal(activeCard);
}

function closeModal(){
  modal.style.display="none";
}

render();
</script>
</body>
</html>
