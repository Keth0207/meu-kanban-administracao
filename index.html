<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Meu Planejador</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f172a;
  color: white;
}

h1 {
  text-align: center;
  padding: 10px;
}

button {
  padding: 6px;
  border: none;
  border-radius: 6px;
  background: #2563eb;
  color: white;
  cursor: pointer;
}

.board {
  display: flex;
  gap: 12px;
  padding: 12px;
  overflow-x: auto;
}

.column {
  background: #1e293b;
  min-width: 260px;
  border-radius: 10px;
  padding: 10px;
}

.column-header {
  display: flex;
  align-items: center;
  cursor: grab;
}

.column-title {
  flex: 1;
  text-align: center;
}

.cards {
  min-height: 60px;
}

.card {
  background: #334155;
  padding: 10px;
  margin: 8px 0;
  border-radius: 8px;
  position: relative;
}

.card.done {
  background: #16a34a;
}

.card-title {
  font-weight: bold;
}

.card-actions {
  position: absolute;
  top: 4px;
  right: 6px;
}

.modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.6);
  display: none;
  align-items: center;
  justify-content: center;
}

.modal-content {
  background: #1e293b;
  width: 95%;
  max-width: 450px;
  padding: 16px;
  border-radius: 10px;
}

.subtask {
  display: flex;
  gap: 6px;
  margin: 4px 0;
}

.attachment {
  font-size: 13px;
  margin: 4px 0;
}
</style>
</head>

<body>

<h1>📋 Meu Planejador</h1>
<div style="text-align:center">
  <button onclick="addColumn()">+ Nova coluna</button>
</div>

<div class="board" id="board"></div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-content">
    <h3 contenteditable id="modalTitle"></h3>

    <h4>☑️ Subtarefas</h4>
    <div id="subtasks"></div>
    <button onclick="addSubtask()">+ Subtarefa</button>

    <h4>📎 Anexos</h4>
    <input type="file" id="fileInput">
    <div id="attachments"></div>

    <br>
    <button onclick="closeModal()">Fechar</button>
  </div>
</div>

<script>
let draggedCard = null;
let activeCard = null;

/* COLUNA */
function addColumn() {
  const col = document.createElement("div");
  col.className = "column";

  const head = document.createElement("div");
  head.className = "column-header";
  head.draggable = true;

  const title = document.createElement("div");
  title.className = "column-title";
  title.contentEditable = true;
  title.textContent = "Nova coluna";

  head.append(title);
  col.append(head);

  const cards = document.createElement("div");
  cards.className = "cards";
  cards.ondragover = e => e.preventDefault();
  cards.ondrop = () => {
    if (draggedCard) cards.appendChild(draggedCard);
    updateDone(cards);
  };

  const btn = document.createElement("button");
  btn.textContent = "+ Tarefa";
  btn.onclick = () => addCard(cards);

  col.append(cards, btn);
  board.appendChild(col);
}

/* CARTÃO */
function addCard(container) {
  const card = document.createElement("div");
  card.className = "card";
  card.draggable = true;
  card.subtasks = [];
  card.attachments = [];

  const title = document.createElement("div");
  title.className = "card-title";
  title.contentEditable = true;
  title.textContent = "Nova tarefa";

  card.onclick = () => openModal(card);
  card.ondragstart = () => draggedCard = card;

  card.append(title);
  container.appendChild(card);

  updateDone(container);
}

/* CONCLUÍDO */
function updateDone(container) {
  const colTitle = container.parentElement
    .querySelector(".column-title")
    .textContent.toLowerCase();

  [...container.children].forEach(card => {
    card.classList.toggle("done", colTitle.includes("conclu"));
  });
}

/* MODAL */
function openModal(card) {
  activeCard = card;
  modalTitle.innerText = card.querySelector(".card-title").innerText;
  renderSubtasks();
  renderAttachments();
  modal.style.display = "flex";
}

function closeModal() {
  activeCard.querySelector(".card-title").innerText = modalTitle.innerText;
  modal.style.display = "none";
}

/* SUBTAREFAS */
function addSubtask() {
  const text = prompt("Nome da subtarefa:");
  if (!text) return;
  activeCard.subtasks.push({ text, done:false });
  renderSubtasks();
}

function renderSubtasks() {
  subtasks.innerHTML = "";
  activeCard.subtasks.forEach((s,i) => {
    const div = document.createElement("div");
    div.className = "subtask";

    const chk = document.createElement("input");
    chk.type = "checkbox";
    chk.checked = s.done;
    chk.onchange = () => s.done = chk.checked;

    const span = document.createElement("span");
    span.textContent = s.text;

    div.append(chk, span);
    subtasks.appendChild(div);
  });
}

/* ANEXOS */
fileInput.onchange = () => {
  const file = fileInput.files[0];
  if (!file) return;

  activeCard.attachments.push(file.name);
  fileInput.value = "";
  renderAttachments();
};

function renderAttachments() {
  attachments.innerHTML = "";
  activeCard.attachments.forEach(a => {
    const div = document.createElement("div");
    div.className = "attachment";
    div.textContent = "📎 " + a;
    attachments.appendChild(div);
  });
}
</script>

</body>
</html>
