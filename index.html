<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Quadro de Tarefas</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{margin:0;font-family:Arial;background:#f4f6f8}
#board{display:flex;gap:12px;padding:15px;overflow-x:auto}
.column{background:#e9ecef;min-width:260px;border-radius:8px;display:flex;flex-direction:column}
.column-header{padding:8px;background:#dee2e6;font-weight:bold;cursor:grab}
.column-header input{width:100%;border:none;background:transparent;font-weight:bold}
.cards{padding:8px;flex:1}
.card{background:#fff;border-radius:6px;padding:8px;margin-bottom:8px;cursor:grab;position:relative}
.icons{position:absolute;top:5px;right:5px;display:flex;gap:6px}
.icon{cursor:pointer}
.green{background:#d4edda!important}
.yellow{background:#fff3cd!important}
.blue{background:#0b3c5d!important;color:#fff}
.stripe-green{border-left:5px solid #28a745}
.stripe-yellow{border-left:5px solid #ffc107}
.check-indicator{font-size:12px;margin-top:5px}
button{border:none;padding:8px;border-radius:6px;cursor:pointer}
</style>
</head>

<body>

<div id="board"></div>
<button onclick="addColumn()">+ Nova coluna</button>

<script>
let state = JSON.parse(localStorage.getItem("board")) || {columns:[]};

let draggedCard = null;
let draggedColumn = null;

function save(){
  localStorage.setItem("board", JSON.stringify(state));
}

function addColumn(){
  if(state.columns.length >= 25){
    alert("Máximo de 25 colunas");
    return;
  }
  state.columns.push({title:"Nova coluna", cards:[]});
  save();
  render();
}

function render(){
  board.innerHTML = "";

  state.columns.forEach((col, colIndex) => {
    const column = document.createElement("div");
    column.className = "column";

    /* HEADER DA COLUNA (ÚNICO LUGAR QUE MOVE COLUNA) */
    const header = document.createElement("div");
    header.className = "column-header";
    header.draggable = true;

    header.ondragstart = e => {
      draggedColumn = colIndex;
      e.stopPropagation();
    };

    const titleInput = document.createElement("input");
    titleInput.value = col.title;
    titleInput.onchange = e => {
      col.title = e.target.value;
      save();
      render();
    };
    header.appendChild(titleInput);

    column.ondragover = e => {
      if(draggedColumn !== null) e.preventDefault();
    };

    column.ondrop = e => {
      if(draggedColumn === null) return;
      const temp = state.columns[draggedColumn];
      state.columns.splice(draggedColumn,1);
      state.columns.splice(colIndex,0,temp);
      draggedColumn = null;
      save();
      render();
    };

    /* ÁREA DE CARDS */
    const cards = document.createElement("div");
    cards.className = "cards";

    cards.ondragover = e => e.preventDefault();
    cards.ondrop = e => {
      e.stopPropagation();
      if(!draggedCard) return;
      draggedCard.from.cards.splice(draggedCard.index,1);
      col.cards.push(draggedCard.card);
      draggedCard = null;
      save();
      render();
    };

    col.cards.forEach((card, cardIndex) => {
      const c = document.createElement("div");
      c.className = "card";
      c.draggable = true;

      c.ondragstart = e => {
        draggedCard = {card, index:cardIndex, from:col};
        e.stopPropagation();
      };

      const title = document.createElement("div");
      title.contentEditable = true;
      title.innerText = card.title;
      title.onblur = e => {
        card.title = e.target.innerText;
        save();
        render();
      };
      c.appendChild(title);

      if(card.checklist.length){
        const done = card.checklist.filter(i=>i.done).length;
        const ind = document.createElement("div");
        ind.className="check-indicator";
        ind.innerText = `✔ ${done}/${card.checklist.length}`;
        c.appendChild(ind);
      }

      const icons = document.createElement("div");
      icons.className = "icons";

      const del = document.createElement("span");
      del.className = "icon";
      del.innerText = "✖";
      del.onclick = () => {
        col.cards.splice(cardIndex,1);
        save();
        render();
      };
      icons.appendChild(del);
      c.appendChild(icons);

      const t = col.title.toLowerCase();
      if(t.includes("concluído")){
        c.classList.add("green","stripe-green");
      }
      if(t.includes("andamento")){
        c.classList.add("yellow","stripe-yellow");
      }
      if(card.title.includes("AdmK")){
        c.classList.add("blue");
      }

      cards.appendChild(c);
    });

    const addCardBtn = document.createElement("button");
    addCardBtn.innerText = "+ Card";
    addCardBtn.onclick = () => {
      col.cards.push({title:"Nova tarefa", checklist:[]});
      save();
      render();
    };

    column.appendChild(header);
    column.appendChild(cards);
    column.appendChild(addCardBtn);
    board.appendChild(column);
  });
}

render();
</script>
</body>
</html>
