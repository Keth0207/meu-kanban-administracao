<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Meu Planejador</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f172a;
  color: white;
}

h1 {
  text-align: center;
  padding: 12px;
}

.board {
  display: flex;
  gap: 12px;
  padding: 12px;
  overflow-x: auto;
}

.column {
  background: #1e293b;
  min-width: 240px;
  border-radius: 10px;
  padding: 10px;
}

.column h2 {
  text-align: center;
  font-size: 16px;
}

.cards {
  min-height: 80px;
  padding: 5px;
}

.card {
  background: #334155;
  padding: 10px;
  margin: 8px 0;
  border-radius: 8px;
  cursor: grab;
}

.card.done {
  background: #16a34a;
  color: white;
}

button {
  width: 100%;
  margin-top: 8px;
  padding: 8px;
  border: none;
  border-radius: 6px;
  background: #2563eb;
  color: white;
  font-size: 14px;
}
</style>
</head>

<body>

<h1>📋 Meu Planejador</h1>

<div class="board">

<!-- COLUNA 1 -->
<div class="column">
  <h2>📝 A Fazer</h2>
  <div class="cards" ondragover="allowDrop(event)" ondrop="drop(event, false)">
  </div>
  <button onclick="addCard()">+ Nova Tarefa</button>
</div>

<!-- COLUNAS INTERMEDIÁRIAS -->
<script>
for (let i = 2; i <= 9; i++) {
  document.write(`
  <div class="column">
    <h2>Coluna ${i}</h2>
    <div class="cards" ondragover="allowDrop(event)" ondrop="drop(event, false)"></div>
  </div>
  `);
}
</script>

<!-- COLUNA FINAL -->
<div class="column">
  <h2>✅ Concluído</h2>
  <div class="cards" ondragover="allowDrop(event)" ondrop="drop(event, true)"></div>
</div>

</div>

<script>
let draggedCard = null;
let idCounter = 0;

function addCard() {
  const card = document.createElement("div");
  card.className = "card";
  card.id = "card-" + idCounter++;
  card.draggable = true;
  card.contentEditable = true;
  card.textContent = "Nova tarefa";
  card.ondragstart = () => draggedCard = card;

  document.querySelector(".cards").appendChild(card);
}

function allowDrop(ev) {
  ev.preventDefault();
}

function drop(ev, isDone) {
  ev.preventDefault();
  if (!draggedCard) return;

  draggedCard.classList.remove("done");

  if (isDone) {
    draggedCard.classList.add("done");
  }

  ev.target.appendChild(draggedCard);
  draggedCard = null;
}
</script>

</body>
</html>
