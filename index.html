<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8" />
<title>Meu Planejador</title>
<style>
body {
  margin:0;
  font-family: Arial, sans-serif;
  background:#f4f5f7;
}

header {
  padding:10px;
  background:#026aa7;
  color:#fff;
  display:flex;
  align-items:center;
  gap:10px;
}

header h1 {
  margin:0;
  cursor:pointer;
}

#board {
  display:flex;
  gap:10px;
  padding:10px;
  overflow-x:auto;
}

/* COLUNA */
.column {
  background:#ebecf0;
  width:260px;
  padding:8px;
  border-radius:4px;
}

.column-header {
  display:flex;
  justify-content:space-between;
  align-items:center;
  cursor:grab;
}

.column-header span {
  font-weight:bold;
  cursor:text;
}

.column button {
  border:none;
  background:none;
  cursor:pointer;
}

.cards {
  min-height:20px;
}

/* CARD */
.card {
  background:#fff;
  margin:6px 0;
  padding:6px;
  border-radius:4px;
  cursor:grab;
  border-left:6px solid transparent;
}

.card.concluido {
  background:#3cb371;
  color:#fff;
}

.card-footer {
  display:flex;
  justify-content:space-between;
  font-size:12px;
}

/* ÁREAS (listra) */
.area-financeiro{border-left-color:#2f5d3a;}
.area-administrativo{border-left-color:#0a2a66;}
.area-rh{border-left-color:#6a0dad;}
.area-operacional{border-left-color:#f57c00;}
.area-marketing{border-left-color:#e91e63;}
.area-recepcao{border-left-color:#d7c4a3;}
.area-limpeza{border-left-color:#6d4c41;}

/* MODAL */
#modal {
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.5);
  display:none;
  align-items:center;
  justify-content:center;
}

#modal-content {
  background:#fff;
  padding:15px;
  width:300px;
  border-radius:6px;
}
</style>
</head>

<body>

<header>
  <h1 contenteditable id="boardName">Meu Quadro</h1>
  <button onclick="addColumn()">➕ Coluna</button>
</header>

<div id="board"></div>

<div id="modal">
  <div id="modal-content">
    <h3>Detalhes</h3>
    <textarea id="desc" placeholder="Descrição / links"></textarea>
    <div id="checklist"></div>
    <button onclick="saveModal()">Salvar</button>
    <button onclick="closeModal()">Fechar</button>
  </div>
</div>

<script>
let state = JSON.parse(localStorage.getItem("kanban")) || {
  name:"Meu Quadro",
  columns:[]
};

let draggedCard=null, draggedColumn=null, currentCard=null;

document.getElementById("boardName").innerText = state.name;
document.getElementById("boardName").onblur = e=>{
  state.name=e.target.innerText;
  save();
};

function save(){
  localStorage.setItem("kanban",JSON.stringify(state));
}

function addColumn(){
  if(state.columns.length>=25) return alert("Máx 25 colunas");
  state.columns.push({title:"Nova Coluna",cards:[]});
  save();render();
}

function render(){
  const board=document.getElementById("board");
  board.innerHTML="";
  state.columns.forEach((col,cIdx)=>{
    const c=document.createElement("div");
    c.className="column";

    const h=document.createElement("div");
    h.className="column-header";
    h.draggable=true;
    h.ondragstart=()=>draggedColumn=cIdx;
    h.ondragover=e=>{ if(draggedColumn!==null) e.preventDefault(); };
    h.ondrop=()=>{
      if(draggedColumn===null) return;
      const tmp=state.columns[draggedColumn];
      state.columns.splice(draggedColumn,1);
      state.columns.splice(cIdx,0,tmp);
      draggedColumn=null;
      save();render();
    };

    const t=document.createElement("span");
    t.contentEditable=true;
    t.innerText=col.title;
    t.onblur=e=>{col.title=e.target.innerText;save();render();};

    const del=document.createElement("button");
    del.innerText="🗑";
    del.onclick=()=>{state.columns.splice(cIdx,1);save();render();};

    h.append(t,del);
    c.appendChild(h);

    const cards=document.createElement("div");
    cards.className="cards";
    cards.ondragover=e=>e.preventDefault();
    cards.ondrop=e=>{
      e.stopPropagation();
      if(!draggedCard) return;
      draggedCard.from.cards.splice(draggedCard.idx,1);
      col.cards.push(draggedCard.card);
      draggedCard=null;
      save();render();
    };

    col.cards.forEach((card,idx)=>{
      const cd=document.createElement("div");
      cd.className="card "+(card.area||"");
      cd.draggable=true;

      if(/conclu[ií]d/i.test(col.title)) cd.classList.add("concluido");

      cd.ondragstart=()=>draggedCard={card,idx,from:col};

      const name=document.createElement("div");
      name.contentEditable=true;
      name.innerText=card.name;
      name.onblur=e=>{card.name=e.target.innerText;save();};

      const f=document.createElement("div");
      f.className="card-footer";
      f.innerHTML=card.checklist?.length?`✔ ${card.done||0}/${card.checklist.length}`:"";

      cd.onclick=()=>openModal(card);
      cd.append(name,f);
      cards.appendChild(cd);
    });

    const add=document.createElement("button");
    add.innerText="+ Card";
    add.onclick=()=>{
      col.cards.push({name:"Nova tarefa",area:getArea(""),checklist:[],desc:""});
      save();render();
    };

    c.append(cards,add);
    board.appendChild(c);
  });
}

function getArea(name){
  if(/adm/i.test(name)) return "area-administrativo";
  return "";
}

/* MODAL */
function openModal(card){
  currentCard=card;
  document.getElementById("desc").value=card.desc||"";
  renderChecklist();
  modal.style.display="flex";
}

function renderChecklist(){
  const cl=document.getElementById("checklist");
  cl.innerHTML="";
  currentCard.checklist.forEach((i,idx)=>{
    const d=document.createElement("div");
    const c=document.createElement("input");
    c.type="checkbox";
    c.checked=i.ok;
    c.onchange=()=>{i.ok=c.checked;save();};
    d.append(c,i.text);
    cl.appendChild(d);
  });
}

function saveModal(){
  currentCard.desc=document.getElementById("desc").value;
  save();closeModal();
}

function closeModal(){
  modal.style.display="none";
}

render();
</script>
</body>
</html>
